<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

<body>
<div id="app" class="page"></div>
<script>
// ═══════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════
const WORKER_URL = "https://garyland-api.garyland.workers.dev";
const GOOGLE_KEY = "AIzaSyCTUs24auwcikig1MDHuJFcPAKRUj3WajQ";

// ── Spud Personality lives in SOUL.md on the VPS — do not duplicate here ──

// ── Dynamic Leaflet Loader ──
let leafletReady=false,leafletPromise=null;
function loadLeaflet(){
  if(leafletReady)return Promise.resolve();
  if(leafletPromise)return leafletPromise;
  leafletPromise=new Promise((res,rej)=>{
    if(window.L){leafletReady=true;res();return;}
    const css=document.createElement('link');
    css.rel='stylesheet';css.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
    document.head.appendChild(css);
    const js=document.createElement('script');
    js.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    js.onload=()=>{leafletReady=true;res();};
    js.onerror=()=>rej(new Error('Leaflet failed to load'));
    document.head.appendChild(js);
  });
  return leafletPromise;
}

// ── SunCalc ──
const PI=Math.PI,RAD=PI/180,DAY_MS=864e5,J1970=2440588,J2000=2451545,obliq=RAD*23.4397;
const toJulian=d=>d.valueOf()/DAY_MS-0.5+J1970,toDays=d=>toJulian(d)-J2000;
const rightAsc=(l,b)=>Math.atan2(Math.sin(l)*Math.cos(obliq)-Math.tan(b)*Math.sin(obliq),Math.cos(l));
const declin=(l,b)=>Math.asin(Math.sin(b)*Math.cos(obliq)+Math.cos(b)*Math.sin(obliq)*Math.sin(l));
const azFn=(H,phi,dec)=>Math.atan2(Math.sin(H),Math.cos(H)*Math.sin(phi)-Math.tan(dec)*Math.cos(phi));
const altFn=(H,phi,dec)=>Math.asin(Math.sin(phi)*Math.sin(dec)+Math.cos(phi)*Math.cos(dec)*Math.cos(H));
const siderealTime=(d,lw)=>RAD*(280.16+360.9856235*d)-lw;
const solarMeanAnomaly=d=>RAD*(357.5291+0.98560028*d);
const eclipticLong=M=>{const C=RAD*(1.9148*Math.sin(M)+0.02*Math.sin(2*M)+0.0003*Math.sin(3*M));return M+C+RAD*102.9372+PI;};
const sunCoords=d=>{const M=solarMeanAnomaly(d),L=eclipticLong(M);return{dec:declin(L,0),ra:rightAsc(L,0)};};
function getSunPosition(date,lat,lng){const lw=RAD*-lng,phi=RAD*lat,d=toDays(date),c=sunCoords(d),H=siderealTime(d,lw)-c.ra;return{azimuth:azFn(H,phi,c.dec)/RAD+180,altitude:altFn(H,phi,c.dec)/RAD};}

// ── Data ──
const CATS=[
  {id:"sun_pub",icon:"☀️🍺",label:"Pub in the Sun",needsSun:true,ratingFloor:0,gType:"bar",chips:[]},
  {id:"sun_eat",icon:"☀️🍽️",label:"Restaurant in the Sun",needsSun:true,ratingFloor:7,gType:"restaurant",chips:[]},
  {id:"surprise",icon:"🎲",label:"Surprise Me!",needsSun:true,ratingFloor:7,gType:"restaurant",chips:[]},
  {id:"pub",icon:"🍻",label:"Pub O'Clock!",needsSun:false,ratingFloor:7,gType:"bar",chips:[]},
  {id:"eat",icon:"🥘",label:"Eat Out!",needsSun:false,ratingFloor:7,gType:"restaurant",chips:[]},
];

const FOOD_TYPES=["Italian","Pizza","Indian","Greek","Thai","Japanese","Sushi","Burgers","Lebanese","Spanish","Fish","Vegetarian","Vegan"];

const LOAD_MSGS={
  sun:["Calculating sun angles...","Checking shadow patterns...","Finding sunny terraces...","Rating the golden hour potential..."],
  surprise:["Rolling the dice...","Consulting the oracle...","Shuffling the deck...","The beetle is thinking...","Channelling good vibes..."],
  pub:["Pulling pints of data...","Checking the hand pumps...","Sniffing out real fires...","Asking the regulars..."],
  eat:["Tasting the reviews...","Checking the specials board...","Interrogating the sommelier...","Reading between the Michelin lines..."],
};
const getMsgType=id=>id==="surprise"?"surprise":id?.includes("sun")?"sun":id==="pub"?"pub":"eat";
const BEETLE=`<video autoplay loop muted playsinline style="width:120px;height:120px;object-fit:contain" src="beetle.mp4"></video>`;

// ── State ──
let S={
  screen:'location',
  cat:null,prefs:[],loc:"",foodType:null,
  userLat:null,userLng:null,
  date:new Date().toISOString().slice(0,10),
  timeIdx:Math.round((new Date().getHours()*60+new Date().getMinutes())/15),
  results:null,query:null,error:null,
  chatPlace:null,chatMsgs:[],chatLoading:false,
  loadMsgIdx:0,loadInterval:null,searching:false,
  spudChatLoading:false,
  range:null,
  // Pagination
  allGPlaces:[],pageOffset:0,pageSize:10
};

// ── Persistent Storage ──
function loadSpudChat(){try{return JSON.parse(localStorage.getItem('garyland_spud_chat'))||[];}catch(e){return[];}}
function saveSpudChat(msgs){try{localStorage.setItem('garyland_spud_chat',JSON.stringify(msgs));}catch(e){}}
let spudChatHistory=loadSpudChat();
let spudSessionStart=0;

function loadFavourites(){try{return JSON.parse(localStorage.getItem('garyland_favourites'))||[];}catch(e){return[];}}
function saveFavourites(favs){try{localStorage.setItem('garyland_favourites',JSON.stringify(favs));}catch(e){}}
let favourites=loadFavourites();

function isFavourite(name,address){return favourites.some(f=>f.name===name&&f.address===address);}
function toggleFavourite(i){
  const p=S.results.places[i];if(!p)return;
  const idx=favourites.findIndex(f=>f.name===p.name&&f.address===p.address);
  if(idx>=0){favourites.splice(idx,1);}
  else{
    const c=cardCoords[i];
    favourites.push({name:p.name,address:p.address,rating:p.rating,summary:p.summary,price_level:p.price_level,highlights:p.highlights||[],sun_verdict:p.sun_verdict||"",catIcon:S.query?.cat?.icon||"📍",dateAdded:new Date().toISOString().slice(0,10),lat:c?.lat||null,lng:c?.lng||null});
  }
  saveFavourites(favourites);
  // Update just the heart button without re-rendering entire results
  const btn=document.getElementById('fav-'+i);
  if(btn)btn.textContent=isFavourite(p.name,p.address)?'♥':'♡';
}
function removeFavourite(idx){
  if(!confirm('Remove from favourites?'))return;
  favourites.splice(idx,1);
  saveFavourites(favourites);
  renderFavourites();
}
const app=document.getElementById("app");
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const escBr=s=>esc(s).replace(/\n/g,"<br>");
const stripMd=s=>(s||"").replace(/\*\*/g,"").replace(/\*/g,"").replace(/^#+\s/gm,"").replace(/^[-*]\s/gm,"• ");
function timeStr(){const m=S.timeIdx*15;return`${String(Math.floor(m/60)).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`;}

// ── Wake Lock ──
let wakeLock=null;
async function requestWakeLock(){
  try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen');}}catch(e){}
}
function releaseWakeLock(){
  try{if(wakeLock){wakeLock.release();wakeLock=null;}}catch(e){}
}

// ── iOS Visual Viewport Height (for chat keyboard fix) ──
// iOS Safari doesn't resize layout viewport when keyboard opens.
// Track visual viewport height as CSS variable so chat containers
// can use it instead of 100vh/100%.
(function(){
  const vv=window.visualViewport;
  if(!vv)return;
  function setVVH(){
    document.documentElement.style.setProperty('--vvh',vv.height+'px');
  }
  vv.addEventListener('resize',setVVH);
  setVVH();
})();

// ── Venue Coordinates & Shadow Data ──
let cardCoords={};   // {i: {lat, lng}}
let cardBuildings={}; // {i: [building polygons with heights]}
let shadowMaps={};    // {i: Leaflet map instance}
let shadowLayers={};  // {i: Leaflet layer group for shadows}
let buildingLayers={}; // {i: Leaflet layer group for buildings}

function loadRoadDistances(){
  if(!S.userLat||!S.results?.places?.length||!window.google?.maps)return;
  const svc=new google.maps.DistanceMatrixService();
  const origin=new google.maps.LatLng(S.userLat,S.userLng);
  const dests=S.results.places.map(p=>p.address);
  svc.getDistanceMatrix({origins:[origin],destinations:dests,travelMode:'DRIVING',unitSystem:google.maps.UnitSystem.IMPERIAL},(res,st)=>{
    if(st!=='OK'||!res?.rows?.[0])return;

// Claude API
// ═══════════════════════════════════════
async function callClaude(messages,system,sessionId){
  if(!WORKER_URL||WORKER_URL.includes("PASTE")){throw new Error("Worker URL not configured — edit the HTML config section");}
  const body={model:"openclaw",max_tokens:2500,messages};
  if(system)body.system=system;
  if(sessionId)body.sessionId=sessionId;
  const r=await fetch(WORKER_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  if(!r.ok){
    if(r.status===401)throw new Error("Spud auth failed — check worker secrets");
    if(r.status===429)throw new Error("Rate limited — wait a moment");
    throw new Error("API error "+r.status);
  }
  const d=await r.json();
  return d.content?.filter(b=>b.type==="text").map(b=>b.text).join("\n")||"";
}

let mapsReady=false,mapsPromise=null,plSvc=null;
function loadMaps(key){
  if(mapsReady&&plSvc)return Promise.resolve();
  if(mapsPromise)return mapsPromise;
  mapsPromise=new Promise((res,rej)=>{
    if(window.google?.maps?.places){mapsReady=true;initPl();res();return;}
    const s=document.createElement("script");
    s.src=`https://maps.googleapis.com/maps/api/js?key=${key}&libraries=places`;
    s.async=true;s.onload=()=>{mapsReady=true;initPl();res();};s.onerror=()=>rej();
    document.head.appendChild(s);
  });
  return mapsPromise;
}
function initPl(){const d=document.createElement("div");const m=new google.maps.Map(d,{center:{lat:0,lng:0},zoom:1});plSvc=new google.maps.places.PlacesService(m);}
function getPhotosAndGeometry(name,addr){
  return new Promise(res=>{
    if(!plSvc){res({photos:[],lat:null,lng:null});return;}
    plSvc.findPlaceFromQuery({query:`${name}, ${addr}`,fields:["place_id"]},(r,s)=>{
      if(s!==google.maps.places.PlacesServiceStatus.OK||!r?.[0]){res({photos:[],lat:null,lng:null});return;}
      plSvc.getDetails({placeId:r[0].place_id,fields:["photos","geometry"]},(p,s2)=>{
        if(s2!==google.maps.places.PlacesServiceStatus.OK){res({photos:[],lat:null,lng:null});return;}
        const photos=p?.photos?p.photos.slice(0,5).map(ph=>ph.getUrl({maxWidth:400})):[];
        const lat=p?.geometry?.location?.lat()||null;
        const lng=p?.geometry?.location?.lng()||null;
        res({photos,lat,lng});
      });
    });
  });
}

// ═══════════════════════════════════════
// Overpass API — Single Fetch for All Venues
// ═══════════════════════════════════════
let allBuildings=[];  // master list from single Overpass fetch
let overpassDone=false;

async function fetchAllBuildings(coordsList){
  // Build bounding box covering all venues with 60m padding
  if(!coordsList.length)return[];
  let minLat=Infinity,maxLat=-Infinity,minLng=Infinity,maxLng=-Infinity;
  for(const c of coordsList){
    if(c.lat<minLat)minLat=c.lat;
    if(c.lat>maxLat)maxLat=c.lat;
    if(c.lng<minLng)minLng=c.lng;
    if(c.lng>maxLng)maxLng=c.lng;
  }
  // Pad by 60m
  const pad=60/111320;
  const padLng=60/(111320*Math.cos(((minLat+maxLat)/2)*RAD));
  const bbox=`${minLat-pad},${minLng-padLng},${maxLat+pad},${maxLng+padLng}`;
  const query=`[out:json][timeout:20];way["building"](${bbox});out body;>;out skel qt;`;
  const servers=['https://overpass-api.de/api/interpreter','https://overpass.kumi.systems/api/interpreter'];
  for(const server of servers){
    try{
      const r=await fetch(server,{method:'POST',body:'data='+encodeURIComponent(query)});
      if(!r.ok)continue;
      const data=await r.json();
      const buildings=parseBuildings(data);
      if(buildings.length>0)return buildings;
    }catch(e){continue;}
  }
  return[];
}

function parseBuildings(data){
  const nodes={};
  data.elements.forEach(el=>{if(el.type==='node')nodes[el.id]={lat:el.lat,lng:el.lon};});
  const buildings=[];
  data.elements.forEach(el=>{
    if(el.type!=='way'||!el.tags?.building)return;
    const coords=[];
    for(const nid of el.nodes){
      const n=nodes[nid];
      if(n)coords.push([n.lat,n.lng]);
    }
    if(coords.length<3)return;
    let height=12;
    if(el.tags['building:height'])height=parseFloat(el.tags['building:height'])||12;
    else if(el.tags['height'])height=parseFloat(el.tags['height'])||12;
    else if(el.tags['building:levels'])height=(parseFloat(el.tags['building:levels'])||4)*3;
    if(height>200)height=200;
    buildings.push({coords,height});
  });
  return buildings;
}

// Get buildings near a specific point (within radiusM metres)
function getBuildingsNear(lat,lng,radiusM){
  const dlat=radiusM/111320;
  const dlng=radiusM/(111320*Math.cos(lat*RAD));
  return allBuildings.filter(b=>{
    // Check if any vertex of the building is within the radius
    for(const [blat,blng] of b.coords){
      if(Math.abs(blat-lat)<dlat&&Math.abs(blng-lng)<dlng)return true;
    }
    return false;
  });
}

// Called once all venue coords are collected — single Overpass fetch
let pendingCoords=0;
let totalExpected=0;

function onCoordsReady(){
  pendingCoords++;
  // Wait for all, or fire after 4 seconds regardless
  if(pendingCoords>=totalExpected){
    triggerOverpassFetch();
  }
}

let overpassTimeout=null;
function startOverpassWait(expected){
  totalExpected=expected;
  pendingCoords=0;
  overpassDone=false;
  allBuildings=[];
  // Safety timeout — fire even if some coords never arrive
  overpassTimeout=setTimeout(triggerOverpassFetch,4000);
}

async function triggerOverpassFetch(){
  if(overpassDone)return;
  overpassDone=true;
  if(overpassTimeout){clearTimeout(overpassTimeout);overpassTimeout=null;}

  const coordsList=Object.values(cardCoords);
  if(!coordsList.length)return;

  allBuildings=await fetchAllBuildings(coordsList);

  // Distribute to each shadow map
  for(const iStr of Object.keys(shadowMaps)){
    const i=parseInt(iStr);
    const c=cardCoords[i];
    if(!c)continue;
    const nearby=getBuildingsNear(c.lat,c.lng,60);
    cardBuildings[i]=nearby;

    // Hide loading
    const loadEl=document.getElementById('smap-load-'+i);
    if(loadEl)loadEl.style.display='none';

    // Draw buildings
    for(const b of nearby){
      L.polygon(b.coords,{color:'#555',fillColor:'#444',fillOpacity:0.7,weight:1}).addTo(buildingLayers[i]);
    }
    updateShadowMap(i);
  }
}

// ═══════════════════════════════════════
// Shadow Engine
// ═══════════════════════════════════════
function projectShadows(buildings,sunAz,sunAlt,centreLat){
  if(sunAlt<=0)return{shadows:[],dark:true};
  const shadowPolygons=[];
  const altRad=sunAlt*RAD;
  const azRad=(sunAz+180)*RAD;

  for(const b of buildings){
    const shadowLen=b.height/Math.tan(altRad);
    const dLat=shadowLen*Math.cos(azRad)/111320;
    const dLng=shadowLen*Math.sin(azRad)/(111320*Math.cos(centreLat*RAD));

    const allPts=[];
    for(const [lat,lng] of b.coords){
      allPts.push([lat,lng]);
      allPts.push([lat+dLat,lng+dLng]);
    }
    const hull=convexHull(allPts);
    if(hull.length>=3)shadowPolygons.push(hull);
  }
  return{shadows:shadowPolygons,dark:false};
}

function convexHull(points){
  if(points.length<3)return points;
  const pts=[...points].sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
  const cross=(O,A,B)=>(A[0]-O[0])*(B[1]-O[1])-(A[1]-O[1])*(B[0]-O[0]);
  const lower=[];
  for(const p of pts){while(lower.length>=2&&cross(lower[lower.length-2],lower[lower.length-1],p)<=0)lower.pop();lower.push(p);}
  const upper=[];
  for(let i=pts.length-1;i>=0;i--){const p=pts[i];while(upper.length>=2&&cross(upper[upper.length-2],upper[upper.length-1],p)<=0)upper.pop();upper.push(p);}
  lower.pop();upper.pop();
  return lower.concat(upper);
}

// ═══════════════════════════════════════
// Shadow Map Rendering
// ═══════════════════════════════════════
function initShadowMap(i,lat,lng){
  const container=document.getElementById('smap-'+i);
  if(!container||shadowMaps[i])return;

  const map=L.map(container,{
    zoomControl:false,attributionControl:false,
    dragging:false,touchZoom:false,scrollWheelZoom:false,
    doubleClickZoom:false,boxZoom:false,keyboard:false,
    tap:false
  }).setView([lat,lng],18);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:20}).addTo(map);

  L.marker([lat,lng],{icon:L.divIcon({className:'',html:'<div style="width:12px;height:12px;background:#d4a853;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>',iconSize:[12,12],iconAnchor:[6,6]})}).addTo(map);

  shadowMaps[i]=map;
  shadowLayers[i]=L.layerGroup().addTo(map);
  buildingLayers[i]=L.layerGroup().addTo(map);

  setTimeout(()=>{map.invalidateSize();},100);

  // Signal that this card's coords are ready
  onCoordsReady();
}

function updateShadowMap(i){
  const coords=cardCoords[i];
  const buildings=cardBuildings[i];
  if(!coords||!buildings||!shadowLayers[i])return;

  // Clear old shadows
  shadowLayers[i].clearLayers();

  // Calculate sun position for this venue's actual coordinates
  const d=new Date(S.date+"T"+timeStr()+":00");
  const sun=getSunPosition(d,coords.lat,coords.lng);

  if(sun.altitude<=0){
    // After dark — show message
    shadowLayers[i].addLayer(L.tooltip({permanent:true,direction:'center',className:''})
      .setLatLng([coords.lat,coords.lng]).setContent('<span style="color:#8a8478;font-size:11px">☾ Sun below horizon</span>'));
    return;
  }

  const{shadows}=projectShadows(buildings,sun.azimuth,sun.altitude,coords.lat);
  for(const poly of shadows){
    L.polygon(poly,{color:'rgba(0,0,0,0.15)',fillColor:'rgba(0,0,0,0.35)',fillOpacity:0.35,weight:0}).addTo(shadowLayers[i]);
  }
}

  }
}

// Lightbox
let lbCard=null,lbIdx=0;
function openLightbox(card,idx){lbCard=card;lbIdx=idx;renderLightbox();}
function closeLightbox(){lbCard=null;document.getElementById("lb")?.remove();}
function lbPrev(){const urls=cardPhotos[lbCard];if(!urls)return;lbIdx=(lbIdx-1+urls.length)%urls.length;renderLightbox();}
function lbNext(){const urls=cardPhotos[lbCard];if(!urls)return;lbIdx=(lbIdx+1)%urls.length;renderLightbox();}
function renderLightbox(){
  const urls=cardPhotos[lbCard];if(!urls||!urls.length){closeLightbox();return;}
  let el=document.getElementById("lb");
  if(!el){el=document.createElement("div");el.id="lb";el.className="lightbox";document.body.appendChild(el);}
  const multi=urls.length>1;
  el.innerHTML=`<button class="lb-close" ontouchend="event.stopPropagation();closeLightbox()" onclick="closeLightbox()">✕</button>
    ${multi?`<button class="lb-prev" ontouchend="event.stopPropagation();lbPrev()" onclick="event.stopPropagation();lbPrev()">‹</button>`:""}<img src="${urls[lbIdx]}" alt="photo">${multi?`<button class="lb-next" ontouchend="event.stopPropagation();lbNext()" onclick="event.stopPropagation();lbNext()">›</button>`:""}
    ${multi?`<div class="lb-counter">${lbIdx+1} / ${urls.length}</div>`:""}`;
  el.onclick=e=>{if(e.target===el)closeLightbox();};
  let tx=0;
  el.ontouchstart=e=>{if(e.target.tagName==='BUTTON')return;e.preventDefault();tx=e.touches[0].clientX;};
  el.ontouchmove=e=>{if(e.target.tagName==='BUTTON')return;e.preventDefault();};
  el.ontouchend=e=>{if(e.target.tagName==='BUTTON')return;const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?lbNext():lbPrev();}};
}

function tryParseVenues(text){
  try{const m=text.match(/\{[\s\S]*"places"[\s\S]*\}/);if(!m)return null;const p=JSON.parse(m[0].replace(/```json|```/g,"").trim());return p.places?.length?p:null;}catch(e){return null;}
}
let chatPlaces=[];let chatCardPhotos={};
function chatMapPopup(name,addr){
  if(!window.google?.maps){window.open("https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(name+", "+addr),"_blank");return;}
  const gc=new google.maps.Geocoder();
  gc.geocode({address:name+", "+addr},(r,st)=>{
    if(st==="OK"&&r?.[0]){showMapPopup(name,addr,r[0].geometry.location.lat(),r[0].geometry.location.lng());}
    else{window.open("https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(name+", "+addr),"_blank");}
  });
}
function loadChatPhotos(idx,name,addr,placeId){
  if(!GOOGLE_KEY||GOOGLE_KEY.includes("PASTE"))return;
  const timer=setTimeout(()=>{const el=document.getElementById("cph-"+idx);if(el)el.style.display="none";},5000);
  const photoPromise=placeId
    ?loadMaps(GOOGLE_KEY).then(()=>new Promise(res=>{
        if(!plSvc){res({photos:[],lat:null,lng:null});return;}
        plSvc.getDetails({placeId,fields:["photos","geometry"]},(p,s)=>{
          if(s!==google.maps.places.PlacesServiceStatus.OK){res({photos:[],lat:null,lng:null});return;}
          const photos=p?.photos?p.photos.slice(0,5).map(ph=>ph.getUrl({maxWidth:400})):[];
          res({photos,lat:p?.geometry?.location?.lat()||null,lng:p?.geometry?.location?.lng()||null});
        });
      }))
    :loadMaps(GOOGLE_KEY).then(()=>getPhotosAndGeometry(name,addr));
  photoPromise.then(result=>{clearTimeout(timer);
    const el=document.getElementById("cph-"+idx);if(!el)return;
    if(!result.photos.length){el.style.display="none";return;}
    chatCardPhotos[idx]=result.photos;
    cardPhotos["c"+idx]=result.photos;
    el.innerHTML=result.photos.map((u,j)=>`<img src="${u}" alt="photo" loading="lazy" onclick="openLightbox('c'+${idx},${j})">`).join("");
  }).catch(()=>{const el=document.getElementById("cph-"+idx);if(el)el.style.display="none";});
}
function chatToggleFav(i){
  const btn=document.getElementById("cfav-"+i);if(!btn)return;
  const card=btn.closest('.card');if(!card)return;
  let p;try{p=JSON.parse(decodeURIComponent(card.dataset.place||''));}catch(e){p=chatPlaces[i];}
  if(!p)return;
  const idx=favourites.findIndex(f=>f.name===p.name&&f.address===(p.address||''));
  if(idx>=0){favourites.splice(idx,1);}
  else{favourites.push({name:p.name,address:p.address||'',rating:p.rating,summary:p.summary||'',price_level:p.price_level||'',highlights:p.highlights||[],sun_verdict:p.sun_verdict||'',catIcon:'\U0001f4cd',dateAdded:new Date().toISOString().slice(0,10),lat:null,lng:null});}
  saveFavourites(favourites);
  btn.textContent=isFavourite(p.name,p.address||'')?'\u2665':'\u2661';
}

    h+=`<div class="card" data-place="${placeData}" data-place-id="${p.place_id||''}" style="margin:4px 0;animation:fade-up 0.4s ease both;animation-delay:${i*0.08}s">

      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0"><button id="cfav-${idx}" class="fav-btn" onclick="event.stopPropagation();chatToggleFav(${idx})">${isFavourite(p.name,p.address||'')?'\u2665':'\u2661'}</button>${p.price_level?`<span style="font-size:12px;color:#8a8478">${esc(p.price_level)}</span>`:""}<span class="badge ${bc}">${p.rating}/10</span></div></div>
      <div id="cph-${idx}" class="photo-strip"><div class="photo-shimmer" style="width:170px"></div><div class="photo-shimmer" style="width:190px"></div><div class="photo-shimmer" style="width:180px"></div></div>
      <div class="card-body"><p class="card-summary">${esc(p.summary||'')}</p>
      ${p.sun_verdict?`<p class="sun-verdict">\u2600\ufe0f ${esc(p.sun_verdict)}</p>`:""}
      ${p.highlights?.length?`<div class="flex-wrap-tags">${p.highlights.map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>`:""}
      <button class="btn" style="width:100%;margin-top:12px" onclick="openChatFromSpud(${idx})">💬 Want to know more?</button></div></div>`;
  });
  return h;
}

  document.querySelectorAll('[id^="cph-"]').forEach(el=>{

  });
  // Load distances for chat venue cards
  if(S.userLat&&window.google?.maps&&chatPlaces.length){

    const origin=new google.maps.LatLng(S.userLat,S.userLng);

async function sendSpudChat(){

  spudChatHistory.push({role:"user",content:text});

    const locParts=[];if(S.loc)locParts.push(`The user is in/near "${S.loc}".`);if(S.userLat)locParts.push(`GPS: ${S.userLat.toFixed(4)},${S.userLng.toFixed(4)}.`);
    const locCtx=locParts.length?" "+locParts.join(" ")+" Always recommend places close to this location — within walking or short driving distance.":"";
    const sys=`You are in GaryLand freeform chat mode. The user can ask you anything about places, food, drink, days out, things to do.${locCtx} Be conversational and helpful. If they ask you to find specific places, return them as JSON in this format: {"places":[{"name":"...","address":"...","rating":1-10,"summary":"1-2 sentences","price_level":"£/££/£££","highlights":["tag"],"google_maps_query":"name+area","place_id":"<Google place_id if known, else omit>"}]} — the app will render these as nice cards. For general chat that is NOT about finding places, just respond in plain text. NEVER use markdown formatting — no asterisks, no bold, no bullet points. Write in plain conversational English. Keep responses concise.`;
    // Send last 20 messages for context (keep token use reasonable)
    const msgs=spudChatHistory.slice(-20).map(m=>({role:m.role,content:m.content}));

}

// Extract location (city/region) from address for grouping
function extractLocation(addr){
  if(!addr)return'Unknown';
  // Split by comma, take last 2-3 meaningful parts
  const parts=addr.split(',').map(p=>p.trim()).filter(p=>p&&!/^\d+$/.test(p)&&!/^[A-Z]{1,2}\d/.test(p));
  if(parts.length===0)return'Unknown';
  if(parts.length===1)return parts[0];
  // Return city + country or last two meaningful parts
  // Skip postcodes, street numbers
  const meaningful=parts.filter(p=>!/^\d/.test(p)&&p.length>2);
  if(meaningful.length>=2)return meaningful.slice(-2).join(', ');
  return meaningful[meaningful.length-1]||parts[parts.length-1];
}

        getPhotosAndGeometry(f.name,f.address).then(result=>{
          const el=document.getElementById('fav-ph-'+i);

function useCurrentLocation(){
  if(!navigator.geolocation){alert("Geolocation not supported");return;}
  const btn=event.target;btn.textContent="📍 Locating...";btn.disabled=true;
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude,lng=pos.coords.longitude;
    S.userLat=lat;S.userLng=lng;
    const doGeocode=()=>{
      if(window.google?.maps){
        const gc=new google.maps.Geocoder();
        gc.geocode({location:{lat,lng}},(results,status)=>{
          if(status==="OK"&&results[0]){
            const loc=results[0].address_components.find(c=>c.types.includes("locality")||c.types.includes("postal_town")||c.types.includes("sublocality"));
            S.loc=loc?loc.long_name:`${lat.toFixed(4)}, ${lng.toFixed(4)}`;
          } else {
            S.loc=`${lat.toFixed(4)}, ${lng.toFixed(4)}`;
          }
          
          S.screen='welcome';render();
        });
      } else {
        S.loc=`${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        
        S.screen='welcome';render();
      }
    };
    if(GOOGLE_KEY&&!window.google?.maps){loadMaps(GOOGLE_KEY).then(doGeocode).catch(doGeocode);}
    else{doGeocode();}
  },err=>{
    btn.textContent="📍 Use current location";btn.disabled=false;
    alert("Couldn't get location — type it instead");
  },{timeout:10000});
}

async function loadMoreResults(){
  S.pageOffset=(S.pageOffset||0)+S.pageSize;
  S.searching=false;
  S.results=null;
  await doSearch();

async function doSearch(){
  if(S.searching)return;
  const cat=CATS.find(c=>c.id===S.cat);
  if(!cat){alert("Pick a category first");return;}
  if(!S.loc.trim()){alert("Enter a location");return;}
  S.searching=true;

  // Wake lock — keep screen on during search
  await requestWakeLock();

  const q={cat,prefs:[...S.prefs],loc:S.loc,sun:cat.needsSun?{date:S.date,time:timeStr()}:null};
  S.query=q;S.screen="loading";S.error=null;S.loadMsgIdx=0;
  clearInterval(S.loadInterval);S.loadInterval=null;render();

  // Geocode typed location if we don't have coords
  if(!S.userLat&&GOOGLE_KEY){
    try{
      if(!window.google?.maps)await loadMaps(GOOGLE_KEY);
      const gc=new google.maps.Geocoder();
      await new Promise(res=>{gc.geocode({address:S.loc},(r,st)=>{if(st==="OK"&&r?.[0]){S.userLat=r[0].geometry.location.lat();S.userLng=r[0].geometry.location.lng();}res();});});
    }catch(e){}
  }

  // SunCalc — check if sun is up (for sun categories)
  let sunCtx="";
  if(q.sun){
    const lat=S.userLat||51.5,lng=S.userLng||-0.12;
    const d=new Date(q.sun.date+"T"+q.sun.time+":00"),pos=getSunPosition(d,lat,lng);
    // Sun below horizon — no point searching
    if(pos.altitude<=0){
      clearInterval(S.loadInterval);S.loadInterval=null;
      S.error="It's dark out there! No sunshine to be found right now. Try adjusting the time, or search for a Great Pub or Great Restaurant instead — they don't need the sun. 🌙";
      S.searching=false;releaseWakeLock();renderLoading();return;
    }
    sunCtx=`\nSun at ${q.loc}: azimuth ${pos.azimuth.toFixed(0)}°, altitude ${pos.altitude.toFixed(1)}°. User wants OUTSIDE IN DIRECT SUNLIGHT. Evaluate outdoor seating orientation. Be honest — if a place faces the wrong way for this sun angle, say so.`;
  }

  // Google Places nearbySearch — find real venues
  // Use paginated allGPlaces cache so "More" button doesn't re-fetch
  const radiusM=parseRange(S.range||null);
  const gType=cat.gType||"restaurant";
  const ratingFloor=cat.ratingFloor||0;
  const foodTypeStr=S.foodType&&S.foodType!=='ask-spud'?S.foodType:null;

  if(!S.allGPlaces.length&&S.userLat&&plSvc){
    try{
      // Use text search for cuisine-specific queries, nearby for generic
      const raw=foodTypeStr
        ?await googleTextSearch(foodTypeStr+' restaurant '+q.loc,S.userLat,S.userLng,radiusM)
        :await googleNearbySearch(S.userLat,S.userLng,radiusM,gType);
      S.allGPlaces=raw;
    }catch(e){}
  }

  const offset=S.pageOffset||0;
  const gPlaces=S.allGPlaces.slice(offset,offset+S.pageSize);

  // Build prompt — either review Google results or ask Spud to search
  const prefStr=foodTypeStr?`\nCuisine focus: ${foodTypeStr}.`:"";
  const catDesc={sun_pub:"pubs with outdoor seating in direct sun",sun_eat:"restaurants with outdoor dining in direct sun",surprise:"great restaurants with outdoor dining — any cuisine, surprise the user",pub:"pubs",eat:"restaurants"}[q.cat.id]||"places";
  const ratingNote=ratingFloor>0?`\nOnly include places you'd rate ${ratingFloor}/10 or above. Skip anything below that.`:"";
  let prompt;

  if(gPlaces.length>0){
    const listing=gPlaces.map((r,i)=>{
      let line=`${offset+i+1}. ${r.name} — ${r.address}`;
      if(r.gRating)line+=` (Google: ${r.gRating}/5 from ${r.totalRatings} reviews)`;
      if(r.priceLevel!=null)line+=` ${"£".repeat(r.priceLevel+1)}`;
      if(r.isOpen===true)line+=" [open now]";
      if(r.isOpen===false)line+=" [currently closed]";
      return line;
    }).join("\n");
    prompt=`Here are ${gPlaces.length} ${catDesc} near "${q.loc}" from Google:\n\n${listing}${prefStr}${ratingNote}${sunCtx}\n\nReview ALL of them honestly.${ratingFloor>0?" Filter out anything below "+ratingFloor+"/10.":""}\n\nReturn ONLY JSON:\n{"places":[{"name":"<exact name>","address":"<full address>","rating":<1-10>,"summary":"<1-2 opinionated sentences>","price_level":"<£/££/£££>","highlights":["tag","tag"]${q.cat.needsSun?',"sun_verdict":"<honest>"':''},"google_maps_query":"<name+area>"}]}\n\nBe opinionated. Only include places that meet the quality bar.`;
  } else {
    prompt=`Find ${catDesc} near "${q.loc}".${prefStr}${ratingNote}${sunCtx}\n\nSearch the web. Rate each honestly.${ratingFloor>0?" Only include places rated "+ratingFloor+"/10 or above.":""}\n\nReturn ONLY JSON:\n{"places":[{"name":"<real>","address":"<real full address>","rating":<1-10>,"summary":"<1-2 opinionated sentences>","price_level":"<£/££/£££>","highlights":["tag","tag"]${q.cat.needsSun?',"sun_verdict":"<honest>"':''},"google_maps_query":"<name+area>"}]}\n\nBe opinionated. Only real places — never invent one.`;
  }

  try{
    const text=await callClaude([{role:"user",content:prompt}],null,"garyland-search");
    const m=text.match(/\{[\s\S]*"places"[\s\S]*\}/);
    if(!m)throw new Error("No results — try different location");
    const parsed=JSON.parse(m[0].replace(/```json|```/g,"").trim());
    if(!parsed.places?.length)throw new Error("No places found");
    // Inject place_id from gPlaces by name-matching
    if(gPlaces.length){parsed.places.forEach(p=>{if(!p.place_id){const match=gPlaces.find(g=>g.name.toLowerCase()===p.name.toLowerCase()||p.name.toLowerCase().includes(g.name.toLowerCase())||g.name.toLowerCase().includes(p.name.toLowerCase()));if(match?.place_id)p.place_id=match.place_id;}});}
    clearInterval(S.loadInterval);S.loadInterval=null;
    S.results=parsed;S.screen="results";S.searching=false;
    releaseWakeLock();
    render();
  }catch(e){
    clearInterval(S.loadInterval);S.loadInterval=null;
    S.error=e.message;S.searching=false;
    releaseWakeLock();
    renderLoading();
  }
}

// Block iOS rubber-band scroll except inside scrollable results
document.addEventListener('touchmove',function(e){
  let el=e.target;
  while(el&&el!==document.body){
    const s=window.getComputedStyle(el);
    if(s.overflowY==='auto'||s.overflowY==='scroll')return;
    el=el.parentElement;
  }
  e.preventDefault();
},{passive:false});
