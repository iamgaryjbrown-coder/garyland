<script>
// ═══════════════════════════════════════
// CONFIG

const WORKER_URL = "https://garyland-api.garyland.workers.dev";
const GOOGLE_KEY = "AIzaSyCTUs24auwcikig1MDHuJFcPAKRUj3WajQ";

// ── Spud Personality lives in SOUL.md on the VPS — do not duplicate here ──

// ── Dynamic Leaflet Loader ──
let leafletReady=false,leafletPromise=null;
function loadLeaflet(){
  if(leafletReady)return Promise.resolve();
  if(leafletPromise)return leafletPromise;
  leafletPromise=new Promise((res,rej)=>{
    if(window.L){leafletReady=true;res();return;}
    const css=document.createElement('link');
    css.rel='stylesheet';css.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
    document.head.appendChild(css);
    const js=document.createElement('script');
    js.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    js.onload=()=>{leafletReady=true;res();};
    js.onerror=()=>rej(new Error('Leaflet failed to load'));
    document.head.appendChild(js);
  });
  return leafletPromise;
}

// ── Globe.gl Loader (for favourites 3D globe) ──
let globeGlReady=false,globeGlPromise=null;
function loadGlobeGl(){
  if(globeGlReady)return Promise.resolve();
  if(globeGlPromise)return globeGlPromise;
  globeGlPromise=new Promise((res,rej)=>{
    if(window.Globe){globeGlReady=true;res();return;}
    const js=document.createElement('script');
    js.src='https://unpkg.com/globe.gl';
    js.onload=()=>{globeGlReady=true;res();};
    js.onerror=()=>rej(new Error('Globe.gl failed'));
    document.head.appendChild(js);
  });
  return globeGlPromise;
}

// ── SunCalc ──
const PI=Math.PI,RAD=PI/180,DAY_MS=864e5,J1970=2440588,J2000=2451545,obliq=RAD*23.4397;
const toJulian=d=>d.valueOf()/DAY_MS-0.5+J1970,toDays=d=>toJulian(d)-J2000;
const rightAsc=(l,b)=>Math.atan2(Math.sin(l)*Math.cos(obliq)-Math.tan(b)*Math.sin(obliq),Math.cos(l));
const declin=(l,b)=>Math.asin(Math.sin(b)*Math.cos(obliq)+Math.cos(b)*Math.sin(obliq)*Math.sin(l));
const azFn=(H,phi,dec)=>Math.atan2(Math.sin(H),Math.cos(H)*Math.sin(phi)-Math.tan(dec)*Math.cos(phi));
const altFn=(H,phi,dec)=>Math.asin(Math.sin(phi)*Math.sin(dec)+Math.cos(phi)*Math.cos(dec)*Math.cos(H));
const siderealTime=(d,lw)=>RAD*(280.16+360.9856235*d)-lw;
const solarMeanAnomaly=d=>RAD*(357.5291+0.98560028*d);
const eclipticLong=M=>{const C=RAD*(1.9148*Math.sin(M)+0.02*Math.sin(2*M)+0.0003*Math.sin(3*M));return M+C+RAD*102.9372+PI;};
const sunCoords=d=>{const M=solarMeanAnomaly(d),L=eclipticLong(M);return{dec:declin(L,0),ra:rightAsc(L,0)};};
function getSunPosition(date,lat,lng){const lw=RAD*-lng,phi=RAD*lat,d=toDays(date),c=sunCoords(d),H=siderealTime(d,lw)-c.ra;return{azimuth:azFn(H,phi,c.dec)/RAD+180,altitude:altFn(H,phi,c.dec)/RAD};}

// ── Data ──
const CATS=[
  {id:"sun_pub",icon:"☀️🍺",label:"Pub in the Sun",needsSun:true,ratingFloor:0,gType:"bar",chips:[]},
  {id:"sun_eat",icon:"☀️🍽️",label:"Restaurant in the Sun",needsSun:true,ratingFloor:7,gType:"restaurant",chips:[]},
  {id:"pub",icon:"🍻",label:"Pub O'Clock!",needsSun:false,ratingFloor:0,gType:"bar",chips:[]},
  {id:"eat",icon:"🥘",label:"Eat Out!",needsSun:false,ratingFloor:0,gType:"restaurant",chips:[]},
];

const FOOD_TYPES=["Italian","Pizza","Indian","Greek","Thai","Japanese","Sushi","Burgers","Lebanese","Spanish","Fish","Vegetarian","Vegan"];

const LOAD_MSGS={
  sun:["Calculating sun angles...","Checking shadow patterns...","Finding sunny terraces...","Rating the golden hour potential..."],
  pub:["Pulling pints of data...","Checking the hand pumps...","Sniffing out real fires...","Asking the regulars..."],
  eat:["Tasting the reviews...","Checking the specials board...","Interrogating the sommelier...","Reading between the Michelin lines..."],
};
const getMsgType=id=>id?.includes("sun")?"sun":id==="pub"?"pub":"eat";
const BEETLE=`<video autoplay loop muted playsinline style="width:120px;height:120px;object-fit:contain" src="beetle.mp4"></video>`;

// ── State ──
let S={
  screen:'location',
  cat:null,prefs:[],loc:"",foodType:null,
  userLat:null,userLng:null,
  date:new Date().toISOString().slice(0,10),

async function callClaude(messages,system,sessionId){
  if(!WORKER_URL||WORKER_URL.includes("PASTE")){throw new Error("Worker URL not configured — edit the HTML config section");}
  const body={model:"openclaw",max_tokens:2500,messages};
  if(system)body.system=system;
  if(sessionId)body.sessionId=sessionId;
  const r=await fetch(WORKER_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  if(!r.ok){
    if(r.status===401)throw new Error("Spud auth failed — check worker secrets");
    if(r.status===429)throw new Error("Rate limited — wait a moment");
    throw new Error("API error "+r.status);
  }
  const d=await r.json();
  return d.content?.filter(b=>b.type==="text").map(b=>b.text).join("\n")||"";
}

  if(mapsReady&&plSvc)return Promise.resolve();

  mapsPromise=new Promise((res,rej)=>{
    if(window.google?.maps?.places){mapsReady=true;initPl();res();return;}
    const s=document.createElement("script");
    s.src=`https://maps.googleapis.com/maps/api/js?key=${key}&libraries=places`;
    s.async=true;s.onload=()=>{mapsReady=true;initPl();res();};s.onerror=()=>rej();

// ═══════════════════════════════════════
// Overpass API — Single Fetch for All Venues
// ═══════════════════════════════════════
let allBuildings=[];  // master list from single Overpass fetch
let overpassDone=false;

async function fetchAllBuildings(coordsList){
  // Build bounding box covering all venues with 60m padding
  if(!coordsList.length)return[];
  let minLat=Infinity,maxLat=-Infinity,minLng=Infinity,maxLng=-Infinity;
  for(const c of coordsList){
    if(c.lat<minLat)minLat=c.lat;
    if(c.lat>maxLat)maxLat=c.lat;
    if(c.lng<minLng)minLng=c.lng;
    if(c.lng>maxLng)maxLng=c.lng;
  }
  // Pad by 60m
  const pad=60/111320;
  const padLng=60/(111320*Math.cos(((minLat+maxLat)/2)*RAD));
  const bbox=`${minLat-pad},${minLng-padLng},${maxLat+pad},${maxLng+padLng}`;
  const query=`[out:json][timeout:20];way["building"](${bbox});out body;>;out skel qt;`;
  const servers=['https://overpass-api.de/api/interpreter','https://overpass.kumi.systems/api/interpreter'];
  for(const server of servers){
    try{
      const r=await fetch(server,{method:'POST',body:'data='+encodeURIComponent(query)});
      if(!r.ok)continue;
      const data=await r.json();
      const buildings=parseBuildings(data);
      if(buildings.length>0)return buildings;
    }catch(e){continue;}
  }
  return[];
}

function parseBuildings(data){
  const nodes={};
  data.elements.forEach(el=>{if(el.type==='node')nodes[el.id]={lat:el.lat,lng:el.lon};});
  const buildings=[];
  data.elements.forEach(el=>{
    if(el.type!=='way'||!el.tags?.building)return;
    const coords=[];
    for(const nid of el.nodes){
      const n=nodes[nid];
      if(n)coords.push([n.lat,n.lng]);
    }
    if(coords.length<3)return;
    let height=12;
    if(el.tags['building:height'])height=parseFloat(el.tags['building:height'])||12;
    else if(el.tags['height'])height=parseFloat(el.tags['height'])||12;
    else if(el.tags['building:levels'])height=(parseFloat(el.tags['building:levels'])||4)*3;
    if(height>200)height=200;
    buildings.push({coords,height});
  });
  return buildings;
}

// Get buildings near a specific point (within radiusM metres)
function getBuildingsNear(lat,lng,radiusM){
  const dlat=radiusM/111320;
  const dlng=radiusM/(111320*Math.cos(lat*RAD));
  return allBuildings.filter(b=>{
    // Check if any vertex of the building is within the radius
    for(const [blat,blng] of b.coords){
      if(Math.abs(blat-lat)<dlat&&Math.abs(blng-lng)<dlng)return true;
    }
    return false;
  });
}

// Called once all venue coords are collected — single Overpass fetch
let pendingCoords=0;
let totalExpected=0;

function onCoordsReady(){
  pendingCoords++;
  // Wait for all, or fire after 4 seconds regardless
  if(pendingCoords>=totalExpected){
    triggerOverpassFetch();
  }
}

let overpassTimeout=null;
function startOverpassWait(expected){
  totalExpected=expected;
  pendingCoords=0;
  overpassDone=false;
  allBuildings=[];
  // Safety timeout — fire even if some coords never arrive
  overpassTimeout=setTimeout(triggerOverpassFetch,4000);
}

async function triggerOverpassFetch(){
  if(overpassDone)return;
  overpassDone=true;
  if(overpassTimeout){clearTimeout(overpassTimeout);overpassTimeout=null;}

  const coordsList=Object.values(cardCoords);
  if(!coordsList.length)return;

  allBuildings=await fetchAllBuildings(coordsList);

  // Distribute to each shadow map
  for(const iStr of Object.keys(shadowMaps)){
    const i=parseInt(iStr);
    const c=cardCoords[i];
    if(!c)continue;
    const nearby=getBuildingsNear(c.lat,c.lng,60);
    cardBuildings[i]=nearby;

    // Hide loading
    const loadEl=document.getElementById('smap-load-'+i);
    if(loadEl)loadEl.style.display='none';

    // Draw buildings
    for(const b of nearby){
      L.polygon(b.coords,{color:'#555',fillColor:'#444',fillOpacity:0.7,weight:1}).addTo(buildingLayers[i]);
    }
    updateShadowMap(i);
  }
}

// ═══════════════════════════════════════
// Shadow Engine
// ═══════════════════════════════════════
function projectShadows(buildings,sunAz,sunAlt,centreLat){
  if(sunAlt<=0)return{shadows:[],dark:true};
  const shadowPolygons=[];
  const altRad=sunAlt*RAD;
  const azRad=(sunAz+180)*RAD;

  for(const b of buildings){
    const shadowLen=b.height/Math.tan(altRad);
    const dLat=shadowLen*Math.cos(azRad)/111320;
    const dLng=shadowLen*Math.sin(azRad)/(111320*Math.cos(centreLat*RAD));

    const allPts=[];
    for(const [lat,lng] of b.coords){
      allPts.push([lat,lng]);
      allPts.push([lat+dLat,lng+dLng]);
    }
    const hull=convexHull(allPts);
    if(hull.length>=3)shadowPolygons.push(hull);
  }
  return{shadows:shadowPolygons,dark:false};
}

function convexHull(points){
  if(points.length<3)return points;
  const pts=[...points].sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
  const cross=(O,A,B)=>(A[0]-O[0])*(B[1]-O[1])-(A[1]-O[1])*(B[0]-O[0]);
  const lower=[];
  for(const p of pts){while(lower.length>=2&&cross(lower[lower.length-2],lower[lower.length-1],p)<=0)lower.pop();lower.push(p);}
  const upper=[];
  for(let i=pts.length-1;i>=0;i--){const p=pts[i];while(upper.length>=2&&cross(upper[upper.length-2],upper[upper.length-1],p)<=0)upper.pop();upper.push(p);}
  lower.pop();upper.pop();
  return lower.concat(upper);
}

// ═══════════════════════════════════════
// Shadow Map Rendering
// ═══════════════════════════════════════
function initShadowMap(i,lat,lng){
  const container=document.getElementById('smap-'+i);
  if(!container||shadowMaps[i])return;

  const map=L.map(container,{
    zoomControl:false,attributionControl:false,
    dragging:false,touchZoom:false,scrollWheelZoom:false,
    doubleClickZoom:false,boxZoom:false,keyboard:false,
    tap:false
  }).setView([lat,lng],18);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:20}).addTo(map);

  L.marker([lat,lng],{icon:L.divIcon({className:'',html:'<div style="width:12px;height:12px;background:#d4a853;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>',iconSize:[12,12],iconAnchor:[6,6]})}).addTo(map);

  shadowMaps[i]=map;
  shadowLayers[i]=L.layerGroup().addTo(map);
  buildingLayers[i]=L.layerGroup().addTo(map);

  setTimeout(()=>{map.invalidateSize();},100);

  // Signal that this card's coords are ready
  onCoordsReady();
}

function updateShadowMap(i){
  const coords=cardCoords[i];
  const buildings=cardBuildings[i];
  if(!coords||!buildings||!shadowLayers[i])return;

  // Clear old shadows
  shadowLayers[i].clearLayers();

  // Calculate sun position for this venue's actual coordinates
  const d=new Date(S.date+"T"+timeStr()+":00");
  const sun=getSunPosition(d,coords.lat,coords.lng);

  if(sun.altitude<=0){
    // After dark — show message
    shadowLayers[i].addLayer(L.tooltip({permanent:true,direction:'center',className:''})
      .setLatLng([coords.lat,coords.lng]).setContent('<span style="color:#8a8478;font-size:11px">☾ Sun below horizon</span>'));
    return;
  }

  const{shadows}=projectShadows(buildings,sun.azimuth,sun.altitude,coords.lat);
  for(const poly of shadows){
    L.polygon(poly,{color:'rgba(0,0,0,0.15)',fillColor:'rgba(0,0,0,0.35)',fillOpacity:0.35,weight:0}).addTo(shadowLayers[i]);
  }
}

function syncSunControls(){
  document.querySelectorAll('.sun-time-input').forEach(el=>{el.value=S.timeIdx;});
  document.querySelectorAll('.sun-time-display').forEach(el=>{el.textContent=timeStr();});
}

function updateAllShadowMaps(){
  for(const i of Object.keys(shadowMaps)){
    updateShadowMap(parseInt(i));
  }
}

  const urls=cardPhotos[lbCard];if(!urls||!urls.length){closeLightbox();return;}
  let el=document.getElementById("lb");
  if(!el){el=document.createElement("div");el.id="lb";el.className="lightbox";document.body.appendChild(el);}
  const multi=urls.length>1;
  el.innerHTML=`<button class="lb-close" ontouchend="event.stopPropagation();closeLightbox()" onclick="closeLightbox()">✕</button>
    ${multi?`<button class="lb-prev" ontouchend="event.stopPropagation();lbPrev()" onclick="event.stopPropagation();lbPrev()">‹</button>`:""}<img src="${urls[lbIdx]}" alt="photo">${multi?`<button class="lb-next" ontouchend="event.stopPropagation();lbNext()" onclick="event.stopPropagation();lbNext()">›</button>`:""}
    ${multi?`<div class="lb-counter">${lbIdx+1} / ${urls.length}</div>`:""}`;
  el.onclick=e=>{if(e.target===el)closeLightbox();};
  let tx=0;
  el.ontouchstart=e=>{if(e.target.tagName==='BUTTON')return;e.preventDefault();tx=e.touches[0].clientX;};
  el.ontouchmove=e=>{if(e.target.tagName==='BUTTON')return;e.preventDefault();};
  el.ontouchend=e=>{if(e.target.tagName==='BUTTON')return;const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?lbNext():lbPrev();}};
}

  try{const m=text.match(/\{[\s\S]*"places"[\s\S]*\}/);if(!m)return null;const p=JSON.parse(m[0].replace(/```json|```/g,"").trim());return p.places?.length?p:null;}catch(e){return null;}

function chatMapPopup(name,addr){
  if(!window.google?.maps){window.open("https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(name+", "+addr),"_blank");return;}
  const gc=new google.maps.Geocoder();
  gc.geocode({address:name+", "+addr},(r,st)=>{

function countryFlag(code){
  if(!code||code.length!==2||!/^[A-Z]{2}$/i.test(code))return'\u{1F30D}';
  return String.fromCodePoint(...[...code.toUpperCase()].map(c=>0x1F1E6+c.charCodeAt(0)-65));
}

// Migrate old favourites: fix broken catIcon text like "U0001f4cd"
(function migrateFavs(){
  let changed=false;

    if(f.catIcon&&/^U000/i.test(f.catIcon)){f.catIcon='\u{1F4CD}';changed=true;}
  });

})();

function groupFavsByLocation(){
  const groups={};
  favourites.forEach((f,i)=>{
    const cc=f.country_code||'__';
    const country=f.country||(cc==='__'?'Uncategorised':'Unknown');
    const city=f.city||f.searchLocation||'Unknown';
    if(!groups[cc])groups[cc]={country,flag:countryFlag(cc),cities:{}};
    if(!groups[cc].cities[city])groups[cc].cities[city]=[];
    groups[cc].cities[city].push({...f,_idx:i});
  });
  return groups;
}

async function reverseGeoNom(lat,lng){
  const key=`${lat.toFixed(2)}_${lng.toFixed(2)}`;
  if(favGeoCache[key])return favGeoCache[key];
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=10`,{headers:{'User-Agent':'GaryLand/1.0'}});
    const d=await r.json();
    const info={country:d.address?.country||'Unknown',country_code:(d.address?.country_code||'').toUpperCase(),city:d.address?.city||d.address?.town||d.address?.village||d.address?.state||'Unknown'};
    favGeoCache[key]=info;return info;
  }catch(e){return{country:'Unknown',country_code:'',city:'Unknown'};}
}

async function geocodeAddress(name,addr){
  // Try Google Places first (most accurate for venues)
  if(window.google?.maps?.places){
    try{
      const result=await new Promise(resolve=>{
        const svc=new google.maps.places.PlacesService(document.createElement('div'));
        svc.findPlaceFromQuery({query:name+' '+addr,fields:['geometry']},
          (results,status)=>resolve(status==='OK'&&results?.[0]?.geometry?.location?{lat:results[0].geometry.location.lat(),lng:results[0].geometry.location.lng()}:null));
      });
      if(result)return result;
    }catch(e){}
  }
  // Fallback: Nominatim with name + address
  try{
    const q=name+', '+addr;
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,{headers:{'User-Agent':'GaryLand/1.0'}});
    const d=await r.json();
    if(d[0])return{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
  }catch(e){}
  // Fallback: Nominatim with just address
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1`,{headers:{'User-Agent':'GaryLand/1.0'}});
    const d=await r.json();
    if(d[0])return{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
  }catch(e){}
  return null;
}

async function enrichFavGeoProgressive(){
  favEnriching=true;
  let changed=false;
  for(const f of favourites){
    if(!favEnriching)break;
    // Step 1: if no coords OR not yet verified via Google Places, geocode the address
    if((!f.lat||!f.lng||!f._geoVerified)&&f.address){
      const coords=await geocodeAddress(f.name,f.address);
      if(coords){f.lat=coords.lat;f.lng=coords.lng;f._geoVerified=true;changed=true;}
      await new Promise(r=>setTimeout(r,1100));
    }
    // Step 2: if no country, reverse-geocode
    if(!f.country_code&&f.lat&&f.lng){
      const info=await reverseGeoNom(f.lat,f.lng);
      Object.assign(f,info);changed=true;
      if(S.screen==='favourites'){renderFavList();if(favGlobe)addFavMarkers();}
      await new Promise(r=>setTimeout(r,1100));
    }
  }
  if(changed)saveFavourites(favourites);
  favEnriching=false;
}

function initFavGlobe(lat,lng){

  const w=container.clientWidth,h=container.clientHeight;
  const hasMultiple=favourites.filter(f=>f.lat&&f.lng).length>1;

  // Build pin data — preserve original favourites index for list linking

    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')

function scrollToCountry(cc){
  const el=document.getElementById('fav-country-'+cc);
  if(el){
    const listArea=document.getElementById('fav-list');
    if(listArea){const listTop=listArea.getBoundingClientRect().top;const elTop=el.getBoundingClientRect().top;listArea.scrollTop+=elTop-listTop;}
  }
  // Collect all favs for this country
  const groups=groupFavsByLocation();const g=groups[cc];if(!g)return;
  const pts=[];
  Object.values(g.cities).forEach(city=>city.forEach(f=>{if(f.lat&&f.lng)pts.push([f.lat,f.lng]);}));
  if(!pts.length)return;

  // ~5 mile margin ≈ 0.08 degrees
  const margin=0.08;
  const lats=pts.map(p=>p[0]),lngs=pts.map(p=>p[1]);
  const bounds=[[Math.min(...lats)-margin,Math.min(...lngs)-margin],[Math.max(...lats)+margin,Math.max(...lngs)+margin]];

  // If Leaflet is showing, fit bounds there
  if(favLeafletMap){
    addAllLeafletPins(-1);
    favLeafletMap.flyToBounds(bounds,{duration:1.5,maxZoom:15});
    const nav=document.getElementById('fav-nav-buttons');if(nav)nav.style.display='none';
    return;
  }
  // Otherwise show Leaflet with country bounds
  loadLeaflet().then(()=>{
    const wrap=document.getElementById('fav-leaflet');if(!wrap)return;
    if(favLeafletMap){favLeafletMap.remove();favLeafletMap=null;}
    favLeafletMap=L.map(wrap,{zoomControl:false,attributionControl:false}).fitBounds(bounds);
    L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{maxZoom:21,subdomains:['mt0','mt1','mt2','mt3']}).addTo(favLeafletMap);
    L.tileLayer('https://basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}@2x.png',{maxZoom:21,opacity:0.9}).addTo(favLeafletMap);
    addAllLeafletPins(-1);
    wrap.classList.add('active');
    const gbtn=document.getElementById('fav-globe-btn');if(gbtn)gbtn.classList.add('active');
    document.querySelectorAll('.fav-globe-pin').forEach(p=>p.style.display='none');
    const gDiv=document.getElementById('fav-globe');if(gDiv)gDiv.style.visibility='hidden';
    setTimeout(()=>{if(favLeafletMap)favLeafletMap.invalidateSize();},650);
  });
}

function showFavStreetView(idx){
  const f=favourites[idx];if(!f?.lat||!f?.lng)return;

  // If Leaflet already showing — respond instantly, no globe fly
  if(favLeafletMap){
    const wrap=document.getElementById('fav-leaflet');
    addAllLeafletPins(idx);
    const cur=favLeafletMap.getCenter();
    const dist=Math.sqrt(Math.pow(cur.lat-f.lat,2)+Math.pow(cur.lng-f.lng,2));
    if(dist<0.5){
      favLeafletMap.flyTo([f.lat,f.lng],17,{duration:1});
    } else {
      favLeafletMap.flyTo([f.lat,f.lng],17,{duration:2});
    }
    updateFavNavButtons(f);
    highlightFavItem(idx);
    return;
  }

  // First time — globe fly-in then crossfade to Leaflet
  if(favGlobe)favGlobe.pointOfView({lat:f.lat,lng:f.lng,altitude:0.05},1500);
  setTimeout(()=>{
    loadLeaflet().then(()=>{
      const wrap=document.getElementById('fav-leaflet');if(!wrap)return;
      favLeafletMap=L.map(wrap,{zoomControl:false,attributionControl:false}).setView([f.lat,f.lng],17);
      L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{maxZoom:21,subdomains:['mt0','mt1','mt2','mt3']}).addTo(favLeafletMap);
      L.tileLayer('https://basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}@2x.png',{maxZoom:21,opacity:0.9}).addTo(favLeafletMap);
      addAllLeafletPins(idx);
      // Crossfade in + show globe button + hide globe pins
      wrap.classList.add('active');
      const gbtn=document.getElementById('fav-globe-btn');if(gbtn)gbtn.classList.add('active');
      document.querySelectorAll('.fav-globe-pin').forEach(p=>p.style.display='none');
      const gDiv=document.getElementById('fav-globe');if(gDiv)gDiv.style.visibility='hidden';
      updateFavNavButtons(f);
      // Fix Leaflet size + highlight list item after transition settles
      setTimeout(()=>{

    });
  },1500);
}

// EXIF GPS reader (lightweight, inline)
function readExifGps(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=function(e){
      const view=new DataView(e.target.result);
      if(view.getUint16(0)!==0xFFD8){resolve({});return;}
      let offset=2;
      while(offset<view.byteLength){
        if(view.getUint16(offset)===0xFFE1){
          const exif=parseExif(view,offset+4);
          resolve(exif);return;
        }
        offset+=2+view.getUint16(offset+2);
      }
      resolve({});
    };
    reader.readAsArrayBuffer(file);
  });
}
function parseExif(view,start){
  const le=view.getUint16(start+6)===0x4949;
  const g=n=>le?view.getUint16(n,true):view.getUint16(n);
  const gl=n=>le?view.getUint32(n,true):view.getUint32(n);
  const tiffStart=start+6;
  const ifdOff=tiffStart+gl(tiffStart+4);
  let gpsOff=0,dateStr='';
  const cnt=g(ifdOff);
  for(let i=0;i<cnt;i++){
    const entry=ifdOff+2+i*12;
    const tag=g(entry);
    if(tag===0x8825)gpsOff=tiffStart+gl(entry+8);
    if(tag===0x9003){const sOff=tiffStart+gl(entry+8);let s='';for(let j=0;j<19;j++)s+=String.fromCharCode(view.getUint8(sOff+j));dateStr=s;}
  }
  if(!gpsOff)return{date:dateStr};
  const gCnt=g(gpsOff);
  const gps={};
  for(let i=0;i<gCnt;i++){
    const entry=gpsOff+2+i*12;
    const tag=g(entry);
    if(tag===1)gps.latRef=String.fromCharCode(view.getUint8(entry+8));
    if(tag===3)gps.lngRef=String.fromCharCode(view.getUint8(entry+8));
    if(tag===2||tag===4){
      const vOff=tiffStart+gl(entry+8);
      const d=gl(vOff)/gl(vOff+4);
      const m=gl(vOff+8)/gl(vOff+12);
      const s=gl(vOff+16)/gl(vOff+20);
      const dec=d+m/60+s/3600;
      if(tag===2)gps.lat=dec;else gps.lng=dec;
    }
  }
  if(gps.latRef==='S'&&gps.lat)gps.lat=-gps.lat;
  if(gps.lngRef==='W'&&gps.lng)gps.lng=-gps.lng;
  return{lat:gps.lat||null,lng:gps.lng||null,date:dateStr};
}

function resizePhoto(file,maxW){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      const r=Math.min(maxW/img.width,maxW/img.height,1);
      c.width=img.width*r;c.height=img.height*r;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL('image/jpeg',0.7));
    };
    img.src=URL.createObjectURL(file);
  });
}

let benchUploadPhotos=[],benchUploadMain=0;

async function handleBenchUpload(input){
  const files=[...input.files];if(!files.length)return;
  benchUploadPhotos=[];benchUploadMain=0;
  let bestExif={};
  // Process all files
  for(const file of files){
    const [exif,dataUrl]=await Promise.all([readExifGps(file),resizePhoto(file,600)]);
    benchUploadPhotos.push(dataUrl);
    if(exif.lat&&!bestExif.lat)bestExif=exif;
    if(!bestExif.date&&exif.date)bestExif.date=exif.date;
  }
  const date=bestExif.date?bestExif.date.replace(/:/g,'-').slice(0,10):new Date().toISOString().slice(0,10);
  const modal=document.getElementById('bench-upload-modal');
  if(!modal)return;
  modal.dataset.lat=bestExif.lat||'';
  modal.dataset.lng=bestExif.lng||'';
  modal.dataset.date=date;
  // Render thumbnails
  const thumbs=document.getElementById('bench-upload-thumbs');
  thumbs.innerHTML=benchUploadPhotos.map((p,i)=>`<img src="${p}" style="height:80px;border-radius:8px;border:2px solid ${i===0?'#2dd4bf':'#2a2826'};cursor:pointer;flex-shrink:0" onclick="setBenchMain(${i})">`).join('');
  document.getElementById('bench-upload-gps').textContent=bestExif.lat?'\u2705 GPS found':'\u274c No GPS \u2014 location unknown';
  document.getElementById('bench-upload-date').textContent=date;
  document.getElementById('bench-upload-caption').value='';
  modal.style.display='flex';
  input.value='';
}

}

function initBenchGlobe(lat,lng){
  const container=document.getElementById('bench-globe');
  if(!container)return;
  container.innerHTML='';
  const w=container.clientWidth,h=container.clientHeight;
  const pins=[];
  benches.forEach((b,i)=>{if(b.lat&&b.lng)pins.push({lat:b.lat,lng:b.lng,idx:i});});

  benchGlobe=Globe()
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
    .width(w).height(h)
    .showAtmosphere(true).atmosphereColor('lightskyblue').atmosphereAltitude(0.15)
    .htmlElementsData([])
    .htmlElement(d=>{
      const el=document.createElement('div');el.className='fav-globe-pin';
      el.textContent='\u{1FA91}';
      el.style.pointerEvents='auto';el.style.cursor='pointer';
      el.style.transition='opacity 250ms';
      el.onclick=()=>showBenchStreetView(d.idx);
      return el;
    })
    .htmlElementVisibilityModifier((el,isVisible)=>{el.style.opacity=isVisible?1:0;})
    .pointOfView({lat,lng,altitude:2.5},0)
    (container);

  benchGlobe.onGlobeReady(()=>{
    try{const c=benchGlobe.controls();if(c){c.rotateSpeed=0.3;c.zoomSpeed=0.5;c.enableDamping=true;c.dampingFactor=0.12;c.minDistance=101;c.maxDistance=600;}}catch(e){}
    const alt=pins.length>1?0.7:pins.length===1?0.15:1.5;
    setTimeout(()=>{benchGlobe.pointOfView({lat,lng,altitude:alt},2500);},600);
    setTimeout(()=>{benchGlobe.htmlElementsData(pins);},3500);
  });

function benchPinIcon(isActive){

function addAllBenchPins(activeIdx){
  if(!benchLeafletMap)return;
  benchLeafletMap.eachLayer(l=>{if(l instanceof L.Marker)benchLeafletMap.removeLayer(l);});
  benches.forEach((b,i)=>{
    if(!b.lat||!b.lng)return;
    const m=L.marker([b.lat,b.lng],{icon:benchPinIcon(i===activeIdx),interactive:i!==activeIdx,zIndexOffset:i===activeIdx?1000:0});
    m.on('click',()=>showBenchStreetView(i));
    m.addTo(benchLeafletMap);
  });
}

function renderBenchList(){
  const flagsEl=document.getElementById('bench-flags'),listEl=document.getElementById('bench-list');

    return;
  }
  const groups=groupBenchesByLocation();
  const ccs=Object.keys(groups).sort((a,b)=>a==='__'?1:b==='__'?-1:groups[a].country.localeCompare(groups[b].country));
  if(flagsEl)flagsEl.innerHTML=ccs.map(cc=>`<button class="flag-tab" onclick="scrollToBenchCountry('${cc}')" title="${esc(groups[cc].country)}">${groups[cc].flag}</button>`).join('');

  let h='';
  ccs.forEach(cc=>{
    const g=groups[cc];
    h+=`<div id="bench-country-${cc}" class="fav-country-section"><div class="fav-country-header">${g.flag} ${esc(g.country)}</div>`;
    Object.keys(g.cities).sort().forEach(city=>{
      h+=`<div class="fav-city-header">${esc(city)}</div>`;
      g.cities[city].forEach(b=>{
        const i=b._idx;

          ${b.caption?`<div class="card-body"><p class="card-summary">${esc(b.caption)}</p></div>`:''}
        </div>`;

function updateBenchNavButtons(b){

  const ll=b.lat&&b.lng?`${b.lat},${b.lng}`:'';
  nav.innerHTML=`<a href="https://maps.apple.com/?ll=${ll}">\u{1F5FA}\u{FE0F} Apple</a><a href="https://www.google.com/maps/@${ll},17z">\u{1F4CD} Google</a>`;

function showBenchStreetView(idx){
  const b=benches[idx];if(!b?.lat||!b?.lng)return;
  if(benchLeafletMap){
    addAllBenchPins(idx);
    const cur=benchLeafletMap.getCenter();
    const dist=Math.sqrt(Math.pow(cur.lat-b.lat,2)+Math.pow(cur.lng-b.lng,2));
    if(dist<0.5){benchLeafletMap.flyTo([b.lat,b.lng],17,{duration:1});}
    else{benchLeafletMap.flyTo([b.lat,b.lng],17,{duration:2});}
    updateBenchNavButtons(b);
    highlightBenchItem(idx);
    return;
  }
  if(benchGlobe)benchGlobe.pointOfView({lat:b.lat,lng:b.lng,altitude:0.05},1500);
  setTimeout(()=>{
    loadLeaflet().then(()=>{
      const wrap=document.getElementById('bench-leaflet');if(!wrap)return;
      benchLeafletMap=L.map(wrap,{zoomControl:false,attributionControl:false}).setView([b.lat,b.lng],17);
      L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{maxZoom:21,subdomains:['mt0','mt1','mt2','mt3']}).addTo(benchLeafletMap);
      L.tileLayer('https://basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}@2x.png',{maxZoom:21,opacity:0.9}).addTo(benchLeafletMap);
      addAllBenchPins(idx);
      wrap.classList.add('active');
      const gbtn=document.getElementById('bench-globe-btn');if(gbtn)gbtn.classList.add('active');
      document.querySelectorAll('#bench-globe .fav-globe-pin').forEach(p=>p.style.display='none');
      const gDiv=document.getElementById('bench-globe');if(gDiv)gDiv.style.visibility='hidden';
      updateBenchNavButtons(b);
      setTimeout(()=>{if(benchLeafletMap)benchLeafletMap.invalidateSize();highlightBenchItem(idx);},650);
    });
  },1500);
}

function showBenchGlobe(){
  const wrap=document.getElementById('bench-leaflet');
  if(wrap)wrap.classList.remove('active');
  const gbtn=document.getElementById('bench-globe-btn');if(gbtn)gbtn.classList.remove('active');
  const nav=document.getElementById('bench-nav-buttons');if(nav)nav.style.display='none';
  document.querySelectorAll('#bench-globe .fav-globe-pin').forEach(p=>p.style.display='');
  const gDiv=document.getElementById('bench-globe');if(gDiv)gDiv.style.visibility='visible';
  setTimeout(()=>{if(benchLeafletMap){benchLeafletMap.remove();benchLeafletMap=null;}},600);
  if(benchGlobe){
    const hasMultiple=benches.filter(b=>b.lat&&b.lng).length>1;
    const lat=S.userLat||51.5,lng=S.userLng||-0.12;
    benchGlobe.pointOfView({lat,lng,altitude:hasMultiple?0.7:1.5},1500);
  }
}

function scrollToBenchCountry(cc){
  const el=document.getElementById('bench-country-'+cc);
  if(el){const listArea=document.getElementById('bench-list');if(listArea){const lt=listArea.getBoundingClientRect().top;const et=el.getBoundingClientRect().top;listArea.scrollTop+=et-lt;}}
  const groups=groupBenchesByLocation();const g=groups[cc];if(!g)return;
  const pts=[];Object.values(g.cities).forEach(city=>city.forEach(b=>{if(b.lat&&b.lng)pts.push([b.lat,b.lng]);}));
  if(!pts.length)return;
  const margin=0.08;const lats=pts.map(p=>p[0]),lngs=pts.map(p=>p[1]);
  const bounds=[[Math.min(...lats)-margin,Math.min(...lngs)-margin],[Math.max(...lats)+margin,Math.max(...lngs)+margin]];
  if(benchLeafletMap){addAllBenchPins(-1);benchLeafletMap.flyToBounds(bounds,{duration:1.5,maxZoom:15});return;}
  loadLeaflet().then(()=>{
    const wrap=document.getElementById('bench-leaflet');if(!wrap)return;
    if(benchLeafletMap){benchLeafletMap.remove();benchLeafletMap=null;}
    benchLeafletMap=L.map(wrap,{zoomControl:false,attributionControl:false}).fitBounds(bounds);
    L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{maxZoom:21,subdomains:['mt0','mt1','mt2','mt3']}).addTo(benchLeafletMap);
    L.tileLayer('https://basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}@2x.png',{maxZoom:21,opacity:0.9}).addTo(benchLeafletMap);
    addAllBenchPins(-1);
    wrap.classList.add('active');
    const gbtn=document.getElementById('bench-globe-btn');if(gbtn)gbtn.classList.add('active');
    document.querySelectorAll('#bench-globe .fav-globe-pin').forEach(p=>p.style.display='none');
    const gDiv=document.getElementById('bench-globe');if(gDiv)gDiv.style.visibility='hidden';
    setTimeout(()=>{if(benchLeafletMap)benchLeafletMap.invalidateSize();},650);
  });
}

function closeBenches(){
  benchEnriching=false;
  if(benchLeafletMap){benchLeafletMap.remove();benchLeafletMap=null;}
  const gc=document.getElementById('bench-globe');if(gc)gc.innerHTML='';
  benchGlobe=null;benchMarkers=[];S.screen="welcome";S.cat=null;render();
}

async function enrichBenchGeo(){
  benchEnriching=true;let changed=false;
  for(const b of benches){
    if(!benchEnriching)break;
    if(b.country_code||!b.lat||!b.lng)continue;
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${b.lat}&lon=${b.lng}&format=json&zoom=10`,{headers:{'User-Agent':'GaryLand/1.0'}});
      const d=await r.json();
      b.country=d.address?.country||'Unknown';
      b.country_code=(d.address?.country_code||'').toUpperCase();
      b.city=d.address?.city||d.address?.town||d.address?.village||d.address?.state||'Unknown';
      changed=true;
      if(S.screen==='benches')renderBenchList();
      await new Promise(r=>setTimeout(r,1100));
    }catch(e){}
  }
  benchEnriching=false;
}

function useCurrentLocation(){
  if(!navigator.geolocation){alert("Geolocation not supported");return;}
  const btn=event.target;btn.textContent="📍 Locating...";btn.disabled=true;
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude,lng=pos.coords.longitude;
    S.userLat=lat;S.userLng=lng;
    const doGeocode=()=>{
      if(window.google?.maps){
        const gc=new google.maps.Geocoder();
        gc.geocode({location:{lat,lng}},(results,status)=>{
          if(status==="OK"&&results[0]){
            const loc=results[0].address_components.find(c=>c.types.includes("locality")||c.types.includes("postal_town")||c.types.includes("sublocality"));
            S.loc=loc?loc.long_name:`${lat.toFixed(4)}, ${lng.toFixed(4)}`;
          } else {
            S.loc=`${lat.toFixed(4)}, ${lng.toFixed(4)}`;
          }
          
          S.screen='welcome';render();
        });
      } else {
        S.loc=`${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        
        S.screen='welcome';render();
      }
    };
    if(GOOGLE_KEY&&!window.google?.maps){loadMaps(GOOGLE_KEY).then(doGeocode).catch(doGeocode);}
    else{doGeocode();}
  },err=>{
    btn.textContent="📍 Use current location";btn.disabled=false;
    alert("Couldn't get location — type it instead");
  },{timeout:10000});
}

  if(S.pageCache[newOffset]){S.results=S.pageCache[newOffset];S.screen="results";render();return;}

async function doSearch(){
  if(S.searching)return;
  const cat=CATS.find(c=>c.id===S.cat);
  if(!cat){alert("Pick a category first");return;}
  if(!S.loc.trim()){alert("Enter a location");return;}
  S.searching=true;

  // Wake lock — keep screen on during search
  await requestWakeLock();

  const q={cat,prefs:[...S.prefs],loc:S.loc,sun:cat.needsSun?{date:S.date,time:timeStr()}:null};
  S.query=q;S.screen="loading";S.error=null;S.loadMsgIdx=0;
  clearInterval(S.loadInterval);S.loadInterval=null;render();

  // Ensure Maps/Places is loaded (needed for plSvc, even if we already have GPS coords)
  if(GOOGLE_KEY){
    try{ if(!window.google?.maps)await loadMaps(GOOGLE_KEY); }catch(e){}
  }
  // Geocode typed location if we don't have coords
  if(!S.userLat&&GOOGLE_KEY){
    try{
      const gc=new google.maps.Geocoder();
      await new Promise(res=>{gc.geocode({address:S.loc},(r,st)=>{if(st==="OK"&&r?.[0]){S.userLat=r[0].geometry.location.lat();S.userLng=r[0].geometry.location.lng();}res();});});
    }catch(e){}
  }

  // SunCalc — check if sun is up (for sun categories)
  let sunCtx="";
  if(q.sun){
    const lat=S.userLat||51.5,lng=S.userLng||-0.12;
    const d=new Date(q.sun.date+"T"+q.sun.time+":00"),pos=getSunPosition(d,lat,lng);
    // Sun below horizon — no point searching
    if(pos.altitude<=0){
      clearInterval(S.loadInterval);S.loadInterval=null;
      S.error="It's dark out there! No sunshine to be found right now. Try adjusting the time, or search for a Great Pub or Great Restaurant instead — they don't need the sun. 🌙";
      S.searching=false;releaseWakeLock();renderLoading();return;
    }
    sunCtx=`\nSun at ${q.loc}: azimuth ${pos.azimuth.toFixed(0)}°, altitude ${pos.altitude.toFixed(1)}°. User wants OUTSIDE IN DIRECT SUNLIGHT. Evaluate outdoor seating orientation. Be honest — if a place faces the wrong way for this sun angle, say so.`;
  }

  // Google Places nearbySearch — find real venues
  // Use paginated allGPlaces cache so "More" button doesn't re-fetch
  const radiusM=parseRange(S.range||null, cat.id==='pub'||cat.id==='sun_pub'?1500:2000);
  const gType=cat.gType||"restaurant";
  const ratingFloor=cat.ratingFloor||0;
  const foodTypeStr=S.foodType&&S.foodType!=='ask-spud'&&S.foodType!=='surprise'?S.foodType:null;

  if(!S.allGPlaces.length&&S.userLat&&plSvc){
    try{
      // Use text search for cuisine-specific queries, nearby for generic
      const raw=foodTypeStr
        ?await googleTextSearch(foodTypeStr+' restaurant '+q.loc,S.userLat,S.userLng,radiusM)
        :cat.id==='pub'||cat.id==='sun_pub'
          ?await Promise.all([
              googleNearbySearch(S.userLat,S.userLng,radiusM,null,'pub'),
              googleNearbySearch(S.userLat,S.userLng,radiusM,null,'bar'),
              googleNearbySearch(S.userLat,S.userLng,radiusM,null,'wine bar')
            ]).then(results=>{const seen=new Set();return results.flat().filter(p=>{if(!p.place_id||seen.has(p.place_id))return false;seen.add(p.place_id);return true;});})
          :await Promise.all([
              googleNearbySearch(S.userLat,S.userLng,radiusM,'restaurant'),
              googleNearbySearch(S.userLat,S.userLng,radiusM,null,'restaurant'),
              googleNearbySearch(S.userLat,S.userLng,radiusM,null,'cafe')
            ]).then(results=>{const seen=new Set();return results.flat().filter(p=>{if(!p.place_id||seen.has(p.place_id))return false;seen.add(p.place_id);return true;});});
      // Sort by distance from user
      if(S.userLat&&S.userLng){
        const toRad=x=>x*Math.PI/180;
        const dist=(a,b)=>{const R=6371000,dLat=toRad(b.lat-a.lat),dLng=toRad(b.lng-a.lng),x=Math.sin(dLat/2)**2+Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));};
        raw.sort((a,b)=>dist({lat:S.userLat,lng:S.userLng},a)-dist({lat:S.userLat,lng:S.userLng},b));
      }
      S.allGPlaces=raw;
    }catch(e){}
  }

  const offset=S.pageOffset||0;
  const gPlaces=S.allGPlaces.slice(offset,offset+S.pageSize);

  // Build prompt — either review Google results or ask Spud to search
  const prefStr=foodTypeStr?`\nCuisine focus: ${foodTypeStr}.`:"";
  const catDesc={sun_pub:"pubs with outdoor seating in direct sun",sun_eat:"restaurants with outdoor dining in direct sun",pub:"pubs",eat:"restaurants"}[q.cat.id]||"places";
  const ratingNote=ratingFloor>0?`\nOnly include places you'd rate ${ratingFloor}/10 or above. Skip anything below that.`:"";
  let prompt;

  if(gPlaces.length>0){
    const listing=gPlaces.map((r,i)=>{
      let line=`${offset+i+1}. ${r.name} — ${r.address}`;
      if(r.gRating)line+=` (Google: ${r.gRating}/5 from ${r.totalRatings} reviews)`;
      if(r.priceLevel!=null)line+=` ${"£".repeat(r.priceLevel+1)}`;
      if(r.isOpen===true)line+=" [open now]";
      if(r.isOpen===false)line+=" [currently closed]";
      return line;
    }).join("\n");
    prompt=`Here are ${gPlaces.length} ${catDesc} near "${q.loc}" from Google:\n\n${listing}${prefStr}${ratingNote}${sunCtx}\n\nInclude ALL of them — do not filter any out. Rate each honestly (even if low). Return up to 10.${ratingFloor>0?" Also filter out anything below "+ratingFloor+"/10.":""}\n\nReturn ONLY JSON:\n{"places":[{"name":"<exact name>","address":"<full address>","rating":<1-10>,"summary":"<1-2 opinionated sentences>","price_level":"<£/££/£££>","highlights":["tag","tag"]${q.cat.needsSun?',"sun_verdict":"<honest>"':''},"google_maps_query":"<name+area>"}]}\n\nInclude everything — even the average ones. Be honest.`;
  } else {
    prompt=`Find up to 10 ${catDesc} near "${q.loc}".${prefStr}${ratingNote}${sunCtx}\n\nSearch the web. Rate each honestly. Return as many as you can find (up to 10).${ratingFloor>0?" Only include places rated "+ratingFloor+"/10 or above.":""}\n\nReturn ONLY JSON:\n{"places":[{"name":"<real>","address":"<real full address>","rating":<1-10>,"summary":"<1-2 opinionated sentences>","price_level":"<£/££/£££>","highlights":["tag","tag"]${q.cat.needsSun?',"sun_verdict":"<honest>"':''},"google_maps_query":"<name+area>"}]}\n\nBe opinionated. Only real places — never invent one.`;
  }

  try{
    const text=await callClaude([{role:"user",content:prompt}],null,"garyland-search");
    const m=text.match(/\{[\s\S]*"places"[\s\S]*\}/);
    if(!m)throw new Error("No results — try different location");
    const parsed=JSON.parse(m[0].replace(/```json|```/g,"").trim());
    if(!parsed.places?.length)throw new Error("No places found");
    // Inject place_id from gPlaces by name-matching
    if(gPlaces.length){parsed.places.forEach(p=>{if(!p.place_id){const match=gPlaces.find(g=>g.name.toLowerCase()===p.name.toLowerCase()||p.name.toLowerCase().includes(g.name.toLowerCase())||g.name.toLowerCase().includes(p.name.toLowerCase()));if(match?.place_id)p.place_id=match.place_id;}});}
    clearInterval(S.loadInterval);S.loadInterval=null;
    S.pageCache[S.pageOffset||0]=parsed;
    S.results=parsed;S.screen="results";S.searching=false;
    releaseWakeLock();
    render();
  }catch(e){
    clearInterval(S.loadInterval);S.loadInterval=null;
    S.error=e.message;S.searching=false;
    releaseWakeLock();
    renderLoading();
  }
}

// Block iOS rubber-band scroll except inside scrollable results
document.addEventListener('touchmove',function(e){
  let el=e.target;
  while(el&&el!==document.body){
    const s=window.getComputedStyle(el);
    if(s.overflowY==='auto'||s.overflowY==='scroll')return;
    el=el.parentElement;
